<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Colaborativo - Arreglos</title>
    <link rel="stylesheet" href="desing.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Protocolo Colaborativo Unidad 1 - ED (JavaScript)</h1>
            <div class="button-group">
                <button class="action-btn" id="ejecutarArreglosBtn">Ejecutar Arreglos</button>
                <button class="action-btn" id="ejecutarMatricesBtn">Ejecutar Matrices</button>
            </div>
        </header>

        <h2>Salida:</h2>
        <div class="output-container" id="output">
            <!-- El contenido se generará con JavaScript -->
        </div>

        <div class="search-section">
            <h2>Búsqueda en Arreglo</h2>
            <p>Ingrese un valor para buscar en el arreglo original (0-99)</p>
            <button class="btn" id="searchBtn">Iniciar Búsqueda</button>
            <div class="result" id="searchResult">
                <!-- Resultado de la búsqueda aparecerá aquí -->
            </div>
        </div>

        <div class="footer">
            <p>Daniel Steven Arroyo Florez 2025</p>
        </div>
    </div>

    <script src="Funcion.js"></script>
</body>
</html>
